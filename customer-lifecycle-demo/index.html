        <div className="bg-white rounded-xl shadow-lg border border-gray-200 p-4 animate-slide-in" style={{ animationDelay: `${index * 0.1}s` }}>
          <div className="flex items-center gap-2 mb-3">
            <div className={`${colors.bg} p-1.5 rounded-full`}>
              <span className={colors.icon}><IconComp /></span>
            </div>
            <span className="font-semibold text-sm text-gray-800">{name}</span>
            <span className="ml-auto text-xs text-gray-500">{formatTime(message.timestamp)}</span>
          </div>
          <p className="text-sm text-gray-700 leading-relaxed mb-3 whitespace-pre-line">{message.content.body}</p>
          <p className="text-xs text-gray-400 italic">退订回T</p>
        </div>
      );
    };

    // ============ 场景卡片组件 ============
    const ScenarioCard = ({ scenario, isActive, isPlaying, onClick }) => {
      const IconComp = Icons[scenario.icon] || Icons.Zap;
      return (
        <button
          onClick={onClick}
          disabled={isPlaying}
          className={`
            relative overflow-hidden rounded-xl p-4 text-left transition-all duration-300
            ${isActive
              ? `bg-gradient-to-br ${scenario.bgGradient} text-white shadow-xl ring-2 ring-white/30`
              : 'bg-white shadow-sm border border-gray-200 text-[#394551] hover:border-[#5A69E0]/50'
            }
            ${isPlaying && !isActive ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'}
          `}
        >
          <div className={`w-10 h-10 rounded-lg mb-3 flex items-center justify-center ${isActive ? 'bg-white/20' : 'bg-[#5A69E0]/10'}`}>
            <span className={isActive ? 'text-white' : 'text-[#5A69E0]'}><IconComp /></span>
          </div>
          <h3 className="font-semibold text-sm mb-1">{scenario.name}</h3>
          <p className={`text-xs ${isActive ? 'text-white/80' : 'text-gray-500'}`}>
            {scenario.userSegment}
          </p>
        </button>
      );
    };

    // ============ 主组件 ============
    const EngageLabMASimulator = () => {
      const [activeScenarioId, setActiveScenarioId] = useState(null);
      const [currentStepIndex, setCurrentStepIndex] = useState(-1);
      const [messages, setMessages] = useState([]);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isCompleted, setIsCompleted] = useState(false);

      const activeScenario = scenarios.find(s => s.id === activeScenarioId);

      const resetSimulation = useCallback(() => {
        setCurrentStepIndex(-1);
        setMessages([]);
        setIsPlaying(false);
        setIsCompleted(false);
      }, []);

      const startScenario = useCallback((scenarioId) => {
        resetSimulation();
        setActiveScenarioId(scenarioId);
        setIsPlaying(true);
      }, [resetSimulation]);

      // 自动推进工作流（分支二选一逻辑）
      useEffect(() => {
        if (!isPlaying || !activeScenario) return;

        if (currentStepIndex === -1) {
          const timer = setTimeout(() => setCurrentStepIndex(0), 500);
          return () => clearTimeout(timer);
        }

        if (currentStepIndex >= activeScenario.steps.length) {
          setIsPlaying(false);
          setIsCompleted(true);
          return;
        }

        const currentStep = activeScenario.steps[currentStepIndex];

        // 检测是否进入"否"分支的开头
        // 当前步骤是 branchType='no'，且前一个步骤是 condition 或 branchType='yes'
        // 这意味着"是"分支已走完，需要清除"是"分支的消息
        if (currentStep.branchType === 'no') {
          // 找到这个分支段中所有 yes 分支步骤的 stepId
          const prevStep = currentStepIndex > 0 ? activeScenario.steps[currentStepIndex - 1] : null;
          if (prevStep && (prevStep.type === 'condition' || prevStep.branchType === 'yes')) {
            // 清除 yes 分支的消息
            setMessages(prev => prev.filter(msg => {
              // 保留非分支消息和 no 分支消息
              return !activeScenario.steps.some(s => 
                s.branchType === 'yes' && s.id === msg.stepId
              );
            }));
          }
        }

        if (currentStep.channel && currentStep.message) {
          const newMessage = {
            id: `${currentStep.id}-${Date.now()}`,
            channel: currentStep.channel,
            content: currentStep.message,
            timestamp: new Date(),
            stepId: currentStep.id,
          };
          setMessages(prev => [...prev, newMessage]);
        }

        const timer = setTimeout(() => setCurrentStepIndex(prev => prev + 1), 1500);
        return () => clearTimeout(timer);
      }, [isPlaying, currentStepIndex, activeScenario]);

      const getStepState = (index) => {
        if (!activeScenario) return { isActive: false, isCompleted: false, isPending: true };
        if (currentStepIndex > index) return { isActive: false, isCompleted: true, isPending: false };
        if (currentStepIndex === index) return { isActive: true, isCompleted: false, isPending: false };
        return { isActive: false, isCompleted: false, isPending: true };
      };

      const getSegmentBadgeColor = (color) => {
        const colors = {
          purple: 'bg-[#5A69E0]/10 text-[#5A69E0] border-[#5A69E0]/30',
          emerald: 'bg-emerald-500/10 text-emerald-600 border-emerald-500/30',
          violet: 'bg-violet-500/10 text-violet-600 border-violet-500/30',
          orange: 'bg-orange-500/10 text-orange-600 border-orange-500/30',
          slate: 'bg-slate-500/10 text-slate-600 border-slate-500/30',
          amber: 'bg-amber-500/10 text-amber-600 border-amber-500/30',
        };
        return colors[color] || colors.purple;
      };

      // 渲染工作流内容
      const renderWorkflowContent = () => {
        if (!activeScenario) return null;

        const sections = parseStepsToSections(activeScenario.steps);
        const steps = activeScenario.steps;

        return (
          <div className="flex flex-col items-center">
            <div className="text-center mb-8">
              <h3 className="text-[#394551] text-xl font-bold">{activeScenario.name}</h3>
              <p className="text-gray-500 text-sm mt-1">{activeScenario.description}</p>
              <div className={`inline-flex items-center gap-2 mt-3 px-3 py-1.5 rounded-full text-xs font-medium border ${getSegmentBadgeColor(activeScenario.color)}`}>
                <Icons.Users />
                {activeScenario.userSegment}
              </div>
            </div>

            <div className="flex flex-col items-center gap-0">
              {sections.map((section, sectionIdx) => {
                if (section.type === 'linear') {
                  const stepIndex = steps.findIndex(s => s.id === section.step.id);
                  const { isActive, isCompleted, isPending } = getStepState(stepIndex);
                  
                  return (
                    <React.Fragment key={section.step.id}>
                      {sectionIdx > 0 && (
                        <VerticalConnector isActive={isActive} isCompleted={isCompleted} />
                      )}
                      <WorkflowNode
                        step={section.step}
                        isActive={isActive}
                        isCompleted={isCompleted}
                        isPending={isPending}
                        index={stepIndex}
                      />
                    </React.Fragment>
                  );
                } else if (section.type === 'branch') {
                  return (
                    <React.Fragment key={section.condition.id}>
                      {sectionIdx > 0 && (
                        <VerticalConnector 
                          isActive={getStepState(steps.findIndex(s => s.id === section.condition.id)).isActive} 
                          isCompleted={getStepState(steps.findIndex(s => s.id === section.condition.id)).isCompleted} 
                        />
                      )}
                      <BranchSection
                        conditionStep={section.condition}
                        yesSteps={section.yesBranch}
                        noSteps={section.noBranch}
                        currentStepIndex={currentStepIndex}
                        steps={steps}
                      />
                    </React.Fragment>
                  );
                }
                return null;
              })}
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-[#f8f9fc] via-[#eef0fd] to-[#f8f9fc] pb-12">
          {/* 顶部标题栏 */}
          <header className="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
            <div className="pl-40 pr-8 py-6">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <img 
                    src="https://www.coze.cn/s/EavPktuJbVc/" 
                    alt="EngageLab Logo" 
                    referrerPolicy="no-referrer"
                    className="w-12 h-12 rounded-xl object-contain shadow-lg"
                  />
                  <div>
                    <h1 className="text-2xl font-bold text-[#394551]">EngageLab MA</h1>
                    <p className="text-sm text-[#5A69E0]">客户全生命周期自动化演示</p>
                  </div>
                </div>
                <div className="flex items-center gap-4">
                  <div className="flex items-center gap-2 bg-[#CEFB62]/20 border border-[#CEFB62]/30 rounded-full px-4 py-2">
                    <span className="w-2 h-2 bg-[#CEFB62] rounded-full animate-pulse" />
                    <span className="text-[#394551] text-sm font-medium">系统运行中</span>
                  </div>
                  <div className="text-right">
                    <p className="text-[#394551] font-medium">{new Date().toLocaleDateString('zh-CN')}</p>
                    <p className="text-gray-500 text-xs">实时演示</p>
                  </div>
                </div>
              </div>
            </div>
          </header>

          {/* 场景选择卡片 */}
          <div className="px-8 py-6">
            <div className="flex items-center gap-2 mb-4">
              <span className="text-[#5A69E0]"><Icons.Users /></span>
              <span className="text-[#394551] text-sm font-medium">选择自动化场景</span>
            </div>
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
              {scenarios.map((scenario) => (
                <ScenarioCard
                  key={scenario.id}
                  scenario={scenario}
                  isActive={activeScenarioId === scenario.id}
                  isPlaying={isPlaying}
                  onClick={() => startScenario(scenario.id)}
                />
              ))}
            </div>
          </div>

          {/* 主内容区域 - 固定视口高度，两面板独立滚动 */}
          <div className="px-8 pb-8" style={{ height: 'calc(100vh - 200px)' }}>
            <div className="flex flex-col lg:flex-row gap-6 h-full">
              {/* 左侧：工作流画布 */}
              <div className="flex-1 bg-white shadow-lg rounded-2xl border border-gray-200 overflow-hidden flex flex-col">
                <div className="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-[#5A69E0] to-[#3D4DB7] flex items-center justify-center">
                      <span className="text-white"><Icons.TrendingUp /></span>
                    </div>
                    <div>
                      <h2 className="text-[#394551] font-semibold">EngageLab MA 自动化工作流引擎</h2>
                      <p className="text-gray-500 text-xs">自动化工作流可视化</p>
                    </div>
                  </div>
                  {activeScenario && (
                    <div className="flex items-center gap-3">
                      {isPlaying && (
                        <div className="flex items-center gap-2 bg-[#5A69E0]/10 border border-[#5A69E0]/30 rounded-full px-3 py-1.5">
                          <span className="text-[#5A69E0] animate-spin-custom"><Icons.RefreshCw /></span>
                          <span className="text-[#5A69E0] text-xs">执行中...</span>
                        </div>
                      )}
                      {isCompleted && (
                        <div className="flex items-center gap-2 bg-[#CEFB62]/20 border border-[#CEFB62]/30 rounded-full px-3 py-1.5">
                          <span className="text-[#394551]"><Icons.Check /></span>
                          <span className="text-[#394551] text-xs">已完成</span>
                        </div>
                      )}
                      <button
                        onClick={resetSimulation}
                        className="text-gray-400 hover:text-[#394551] transition-colors"
                      >
                        <Icons.RefreshCw />
                      </button>
                    </div>
                  )}
                </div>

                <div className="p-8 flex-1 overflow-y-auto scrollbar-hide">
                  {!activeScenario ? (
                    <div className="h-full flex flex-col items-center justify-center text-center py-12">
                      <div className="w-20 h-20 rounded-2xl bg-[#5A69E0]/5 flex items-center justify-center mb-4">
                        <span className="text-gray-400"><Icons.Sparkles /></span>
                      </div>
                      <h3 className="text-[#394551] text-lg font-medium mb-2">点击上方场景卡片开始演示</h3>
                      <p className="text-gray-500 text-sm max-w-md">
                        点击下方场景卡片，体验跨境电商自动化营销工作流
                      </p>
                    </div>
                  ) : (
                    renderWorkflowContent()
                  )}
                </div>
              </div>

              {/* 右侧：渠道消息流面板 - 固定在视口内，独立滚动 */}
              <div className="w-full lg:w-[420px] bg-white shadow-lg rounded-2xl border border-gray-200 overflow-hidden flex flex-col flex-shrink-0" style={{ maxHeight: '100%' }}>
                <div className="px-6 py-4 border-b border-gray-200 flex items-center gap-3">
                  <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-[#CEFB62] to-[#a8d94a] flex items-center justify-center">
                    <span className="text-[#394551]"><Icons.MessageCircle /></span>
                  </div>
                  <div>
                    <h2 className="text-[#394551] font-semibold">渠道消息流</h2>
                    <p className="text-gray-500 text-xs">实时触达记录</p>
                  </div>
                  <div className="ml-auto">
                    <span className="text-2xl font-bold text-[#394551]">{messages.length}</span>
                    <span className="text-gray-500 text-xs ml-1">条消息</span>
                  </div>
                </div>

                <div className="p-4 flex-1 overflow-y-auto scrollbar-hide space-y-4">
                  {messages.length === 0 ? (
                    <div className="h-full flex flex-col items-center justify-center text-center py-12">
                      <div className="w-16 h-16 rounded-2xl bg-[#5A69E0]/5 flex items-center justify-center mb-4">
                        <span className="text-gray-400"><Icons.Mail /></span>
                      </div>
                      <h3 className="text-[#394551] font-medium mb-2">暂无消息</h3>
                      <p className="text-gray-500 text-sm">
                        工作流执行后，触发的渠道消息将在这里显示
                      </p>
                      <div className="mt-6 flex flex-wrap items-center justify-center gap-4">
                        <div className="flex items-center gap-2 text-gray-500">
                          <Icons.Mail />
                          <span className="text-xs">邮件</span>
                        </div>
                        <div className="flex items-center gap-2 text-gray-500">
                          <Icons.MessageCircle />
                          <span className="text-xs">WhatsApp</span>
                        </div>
                        <div className="flex items-center gap-2 text-gray-500">
                          <Icons.Smartphone />
                          <span className="text-xs">SMS</span>
                        </div>
                        <div className="flex items-center gap-2 text-gray-500">
                          <Icons.Bell />
                          <span className="text-xs">推送</span>
                        </div>
                      </div>
                    </div>
                  ) : (
                    messages.map((message, index) => (
                      <MessageCard key={message.id} message={message} index={index} />
                    ))
                  )}
                </div>
              </div>
            </div>
          </div>

          {/* 底部状态栏 */}
          <div className="fixed bottom-0 left-0 right-0 bg-white shadow-sm border-t border-gray-200 px-8 py-3">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-6">
                <div className="flex items-center gap-2">
                  <div className="w-2 h-2 rounded-full bg-[#CEFB62]" />
                  <span className="text-gray-500 text-xs">MA 引擎运行中</span>
                </div>
                <div className="hidden md:flex items-center gap-4 text-xs text-gray-500">
                  <span>邮件</span>
                  <span className="w-1 h-1 rounded-full bg-gray-400" />
                  <span>WhatsApp</span>
                  <span className="w-1 h-1 rounded-full bg-gray-400" />
                  <span>SMS</span>
                  <span className="w-1 h-1 rounded-full bg-gray-400" />
                  <span>App Push</span>
                  <span className="w-1 h-1 rounded-full bg-gray-400" />
                  <span>Web Push</span>
                </div>
              </div>
              <div className="text-gray-500 text-xs">
                EngageLab 营销自动化 · 演示版 · v2.0
              </div>
            </div>
          </div>
        </div>
      );
    };

    // 渲染应用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<EngageLabMASimulator />);
  </script>
</body>
</html>
