<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngageLab MA - 行业解决方案</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a4e 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 48px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
        }
        .header p {
            font-size: 16px;
            color: rgba(255,255,255,0.6);
        }
        .solutions {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            display: flex;
            align-items: center;
            gap: 24px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 28px 32px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .card:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.25);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }
        .card-icon {
            font-size: 40px;
            flex-shrink: 0;
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.08);
            border-radius: 14px;
        }
        .card-content h2 {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }
        .card-content p {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            line-height: 1.5;
        }
        .card-arrow {
            margin-left: auto;
            font-size: 20px;
            color: rgba(255,255,255,0.3);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .card:hover .card-arrow {
            color: rgba(255,255,255,0.7);
            transform: translateX(4px);
        }
        @media (max-width: 600px) {
            .card { padding: 20px; gap: 16px; }
            .card-icon { width: 48px; height: 48px; font-size: 28px; }
            .card-content h2 { font-size: 17px; }
            .header h1 { font-size: 26px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>EngageLab MA 行业解决方案</h1>
            <p>基于营销自动化平台的行业最佳实践</p>
        </div>
        <div class="solutions">
            <a class="card" href="./fintech-solution/">
                <div class="card-icon">💳</div>
                <div class="card-content">
                    <h2>海外消费金融</h2>
                    <p>覆盖获客、激活、风控、催收全生命周期的智能营销方案</p>
                </div>
                <div class="card-arrow">→</div>
            </a>
            <a class="card" href="./smart-security-solution/">
                <div class="card-icon">🔐</div>
                <div class="card-content">
                    <h2>智能安防硬件（云订阅）</h2>
                    <p>面向智能安防设备的云订阅增长与用户留存方案</p>
                </div>
                <div class="card-arrow">→</div>
            </a>
            <a class="card" href="./tea-beverage-solution/">
                <div class="card-icon">🍵</div>
                <div class="card-content">
                    <h2>新式茶饮出海</h2>
                    <p>助力茶饮品牌海外市场拓展的全渠道用户运营方案</p>
                </div>
                <div class="card-arrow">→</div>
            </a>
        </div>
    </div>
</body>
</html>
